<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex">
<title>Ennous · Arpinge — Access</title>
<style>:root{--bg:#06080a;--fg:#eef1ee;--green:#3fae6a;--line:rgba(255,255,255,.12)}*{box-sizing:border-box}html,body{margin:0;height:100%}
body{background:var(--bg);color:var(--fg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;display:flex;align-items:center;justify-content:center}
.box{width:370px;max-width:90vw;padding:36px 30px;border:1px solid var(--line);border-radius:16px;background:rgba(255,255,255,.02);text-align:center}
.brand{font-size:12px;letter-spacing:.24em;color:var(--green);text-transform:uppercase;margin-bottom:16px;font-weight:700}
h1{font-size:18px;font-weight:700;margin:0 0 8px}p{font-size:13px;color:#9aa6a0;line-height:1.55;margin:0 0 22px}
input{width:100%;padding:12px 14px;background:#0a0d11;border:1px solid var(--line);border-radius:10px;color:var(--fg);font-size:14px;text-align:center;outline:none}
input:focus{border-color:var(--green)}
button{width:100%;margin-top:14px;padding:12px;background:var(--green);color:#04130a;border:0;border-radius:10px;font-weight:700;font-size:12px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer}
.err{color:#d46a5a;font-size:12px;margin-top:12px;min-height:16px}
iframe{position:fixed;inset:0;width:100%;height:100%;border:0;display:none;background:var(--bg)}</style></head>
<body><div class="box" id="box"><div class="brand">ENNOUS</div><h1>Arpinge &mdash; Access</h1>
<p>Private demonstration for the Arpinge group. Enter the access password.</p>
<input id="pw" type="password" placeholder="Access password" autocomplete="off" autofocus>
<button id="go">Enter</button><div class="err" id="err"></div></div>
<iframe id="frame" title="Ennous Arpinge"></iframe>
<script>
function tok(s){let h=0x811c9dc5;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,0x01000193)>>>0;}h=(h^(h>>>15))>>>0;return ('00000000'+h.toString(16)).slice(-8);}
function enter(){var p=document.getElementById('pw').value;if(!p)return;var path='/'+tok(p)+'/';
 fetch(path,{method:'HEAD'}).then(function(r){if(r.ok){document.getElementById('box').style.display='none';var f=document.getElementById('frame');f.src=path;f.style.display='block';}else{document.getElementById('err').textContent='Wrong password. Try again.';}}).catch(function(){document.getElementById('err').textContent='Connection error. Try again.';});}
document.getElementById('go').onclick=enter;
document.getElementById('pw').addEventListener('keydown',function(e){if(e.key==='Enter')enter();});
</script></body></html>
